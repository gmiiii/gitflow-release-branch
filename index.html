<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>NoteKeeper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>NoteKeeper</h1>
    <p class="subtitle">Catatan online sederhana</p>

    <div class="note-form">
      <input type="text" id="noteInput" placeholder="Tulis catatan baru...">
      <button id="addBtn">Tambah</button>
    </div>

    <p id="emptyMsg" style="color:#aaa;font-size:14px;">Belum ada catatan.</p>
    <ul id="noteList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
